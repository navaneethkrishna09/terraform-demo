# IMPORTANT: Before running this workflow, configure the following GitHub Secrets
# in your repository (Settings → Secrets and variables → Actions):
# - AZURE_CLIENT_ID: Azure Service Principal Application ID
# - AZURE_CLIENT_SECRET: Azure Service Principal Password/Client Secret
# - AZURE_TENANT_ID: Azure Tenant ID
# - AZURE_SUBSCRIPTION_ID: Default Azure Subscription ID (optional, can be overridden via workflow_dispatch)
#
# To create a Service Principal:
# az ad sp create-for-rbac --name terraform-sp --role Contributor --scopes /subscriptions/{SUBSCRIPTION_ID}

name: Terraform Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      azure_subscription_id:
        description: 'Azure Subscription ID'
        required: true
        type: string
      approval:
        description: 'Confirm deployment (type: yes)'
        required: true
        type: string

jobs:
  terraform:
    runs-on: ubuntu-latest

    # NOTE: These environment variables require GitHub Secrets to be configured
    # See comments at the top of this file for setup instructions
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ github.event.inputs.azure_subscription_id || secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Approval
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ github.event.inputs.approval }}" != "yes" ]]; then
            echo "Deployment cancelled. Please confirm by typing 'yes'"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan #auto-approve is used here for automation, but in a production environment, consider removing it for manual approval.
